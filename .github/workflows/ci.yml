name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_NAME: raywall
  GITHUB_MAIL: raywall.malheiros@gmail.com
  GO_VERSION: 1.25.6

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install ca-certificates (Local ACT fix)
        if: ${{ env.ACT }}
        run: |
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until

          apt-get update && apt-get install -y ca-certificates git
          update-ca-certificates

      # - name: Verify go.sum is up to date
      #   env:
      #     GOPROXY: direct
      #   run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      # - name: Test
      #   run: CGO_ENABLED=1 go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: coverage.out

  create-version-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.create-tag.outputs.new_tag }}
      previous_tag: ${{ steps.previous-tag.outputs.previous_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ca-certificates (Local ACT fix)
        if: ${{ env.ACT }}
        run: |
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until

          apt-get update && apt-get install -y ca-certificates git
          update-ca-certificates
          
      - name: Set Git Identity
        run: |
          git config --global user.name "${{ env.GITHUB__NAME }}"
          git config --global user.email "${{ env.GITHUB__MAIL }}"

      - name: Get Previous Tag
        id: previous-tag
        run: |
          previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT
          echo "Previous tag: $previous_tag"

      - name: Increment Version and Create Tag
        id: create-tag
        run: |
          previous_version="${{ steps.previous-tag.outputs.previous_tag }}"
          new_tag=""

          # Remove o 'v' inicial para facilitar a comparação numérica (ex: '0.0.8')
          version_without_v=${previous_version:1}

          # Divide a versão em Major, Minor, Patch
          IFS='.' read -r major minor patch <<< "$version_without_v"

          # Use o comando 'test' (ou '[ ]') para comparar o número da versão
          # Se Major for 0 (abrange v0.0.0, v0.0.8, etc.)
          if [ "$major" -lt "1" ]; then
              # Força a transição para a primeira versão estável
              new_tag="v1.0.0"
          else
              # Se a versão já for v1.x.x ou superior, incrementamos o patch
              next_patch=$((patch + 1))
              new_tag="v${major}.${minor}.${next_patch}"
          fi

          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "Creating tag: $new_tag"
          git tag "$new_tag"
          git push --tags

  publish:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.goreleaser.outputs.release_created }}
      proxy_requested: ${{ steps.proxy.outputs.requested }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Install ca-certificates (Local ACT fix)
        if: ${{ env.ACT }}
        run: |
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until

          apt-get update && apt-get install -y ca-certificates git
          update-ca-certificates

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create Release with GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
            distribution: goreleaser
            version: "latest"
            args: release --clean

      - name: Request a Package Update
        id: proxy
        run: |
            echo "Requesting package update for ${{ needs.create-version-tag.outputs.new_tag }}"
            curl -s "https://proxy.golang.org/github.com/${{ github.repository }}/@v/${{ needs.create-version-tag.outputs.new_tag }}.info"

            if [ $? -eq 0 ]; then
              echo "requested=true" >> $GITHUB_OUTPUT
              echo "✅ Package update requested"
            else
              echo "requested=false" >> $GITHUB_OUTPUT
              echo "⚠️ Failed to request package update"
            fi
  